server {
    listen 80;

    # Proxy all /api/* requests to the backend service.
    # The trailing slash on proxy_pass strips the location prefix so
    # /api/tasks → http://backend:8080/api/tasks (not /api//api/tasks).
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Serve the React SPA for all other routes (client-side routing).
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
