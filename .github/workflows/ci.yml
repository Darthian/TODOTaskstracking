name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Backend unit + integration tests ─────────────────────────────────
  backend-tests:
    name: Backend tests (Kotlin + Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run all backend tests
        working-directory: backend
        run: mvn test -B

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/

  # ── Job 2: Frontend unit tests ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests (React + Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watchAll=false --ci
        env:
          CI: true

  # ── Job 3: E2E integration tests (Docker Compose) ───────────────────────────
  integration-tests:
    name: E2E integration tests (Playwright + Docker Compose)
    runs-on: ubuntu-latest
    # Only run after both unit test jobs pass
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build images and run E2E suite
        # --abort-on-container-exit  stops all services when any container exits
        # --exit-code-from e2e       propagates the test runner's exit code to CI
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from e2e

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down all containers and volumes
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
